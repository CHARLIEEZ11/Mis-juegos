
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joystick World | Juegos Gratis en Línea</title>
    <style>
        :root {
            --primary: #6366f1;
            --dark: #0f172a;
            --light: #f8fafc;
            --accent: #10b981;
            --card-bg: #1e293b;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            background-color: var(--dark);
            color: var(--light);
            overflow-x: hidden;
        }

        /* Navegación y Buscador */
        header {
            background: #1e293b;
            padding: 1rem 5%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.4);
        }

        .logo { font-size: 1.8rem; font-weight: 800; color: var(--primary); letter-spacing: -1px; }

        #search {
            padding: 12px 20px;
            border-radius: 25px;
            border: none;
            width: 300px;
            background: #334155;
            color: white;
            outline: none;
            transition: 0.3s;
        }
        #search:focus { width: 350px; background: #475569; }

        /* Barra de Categorías */
        .category-bar {
            display: flex;
            justify-content: center;
            gap: 12px;
            padding: 20px;
            background: #1e293b;
            flex-wrap: wrap;
            border-bottom: 1px solid #334155;
        }

        .cat-btn {
            background: #334155;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
        }

        .cat-btn:hover, .cat-btn.active {
            background: var(--primary);
            transform: translateY(-2px);
        }

        /* Cuadrícula de Juegos */
        .game-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 20px;
            padding: 40px 5%;
        }

        .game-card {
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid transparent;
            position: relative;
        }

        .game-card:hover {
            transform: scale(1.08);
            border-color: var(--primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .game-thumb {
            width: 100%;
            aspect-ratio: 1/1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3.5rem;
            background: linear-gradient(135deg, #334155 0%, #1e293b 100%);
        }

        .game-info {
            padding: 12px;
            text-align: center;
            background: rgba(0,0,0,0.2);
        }

        .game-title { font-weight: 700; font-size: 0.9rem; }

        /* Modal del Juego */
        #game-modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.98);
            z-index: 2000;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            width: 90%;
            height: 85%;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: 4px solid var(--primary);
            border-radius: 15px;
            background: #000;
        }

        .close-btn {
            align-self: flex-end;
            margin-bottom: 10px;
            background: #ef4444;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            margin-right: 5%;
        }

        @media (max-width: 600px) {
            #search { width: 100%; margin-top: 10px; }
            header { flex-direction: column; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo"> JOYSTICK.io</div>
    <input type="text" id="search" placeholder="Busca un juego..." onkeyup="filterGames()">
</header>

<div class="category-bar">
    <button class="cat-btn active" onclick="filterCategory('todos', this)">Todos</button>
    <button class="cat-btn" onclick="filterCategory('accion', this)">Acción</button>
    <button class="cat-btn" onclick="filterCategory('puzle', this)">Puzle</button>
    <button class="cat-btn" onclick="filterCategory('clasicos', this)">Clásicos</button>
</div>

<main class="game-grid" id="grid">
    <div class="game-card" data-category="puzle" onclick="openGame('https://2048.org/')">
        <div class="game-thumb"></div>
        <div class="game-info"><div class="game-title">2048</div></div>
    </div>

    <div class="game-card" data-category="accion" onclick="openGame('https://www.google.com/logos/2010/pacman10-i.html')">
        <div class="game-thumb">🟡</div>
        <div class="game-info"><div class="game-title">Pac-Man</div></div>
    </div>

    <div class="game-card" data-category="accion" onclick="openGame('https://ellisonleao.github.io/clumsy-bird/')">
        <div class="game-thumb"></div>
        <div class="game-info"><div class="game-title">Clumsy Bird</div></div>
    </div>

    <div class="game-card" data-category="puzle" onclick="openGame('https://hextris.io/')">
        <div class="game-thumb">⬢</div>
        <div class="game-info"><div class="game-title">Hextris</div></div>
    </div>

    <div class="game-card" data-category="clasicos" onclick="openGame('https://javascript.info/article/selection-range/test.html')">
        <div class="game-thumb"></div>
        <div class="game-info"><div class="game-title">Snake Retro</div></div>
    </div>
</main>

<div id="game-modal">
    <button class="close-btn" onclick="closeGame()">CERRAR JUEGO ✖</button>
    <div class="modal-content">
        <iframe id="game-frame" src="" frameborder="0" allowfullscreen></iframe>
    </div>
</div>

<script>
    function openGame(url) {
        document.getElementById('game-frame').src = url;
        document.getElementById('game-modal').style.display = 'flex';
        document.body.style.overflow = 'hidden'; // Bloquea el scroll
    }

    function closeGame() {
        document.getElementById('game-modal').style.display = 'none';
        document.getElementById('game-frame').src = '';
        document.body.style.overflow = 'auto'; // Libera el scroll
    }

    function filterCategory(cat, btn) {
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');

        let cards = document.getElementsByClassName('game-card');
        for (let card of cards) {
            if (cat === 'todos' || card.getAttribute('data-category') === cat) {
                card.style.display = "block";
            } else {
                card.style.display = "none";
            }
        }
    }

    function filterGames() {
        let input = document.getElementById('search').value.toLowerCase();
        let cards = document.getElementsByClassName('game-card');
        for (let card of cards) {
            let title = card.querySelector('.game-title').innerText.toLowerCase();
            card.style.display = title.includes(input) ? "block" : "none";
        }
    }
</script>

</body>
</html>
